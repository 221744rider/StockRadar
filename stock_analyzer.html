    var pw=W-pad.left-pad.right,ph=H-pad.top-pad.bottom;
    var closes=candles.map(function(c){return c.c}).filter(function(v){return v!=null});
    if(!closes.length)return;
    var min=Math.min.apply(null,closes)*0.98,max=Math.max.apply(null,closes)*1.02;
    var yScale=function(v){return pad.top+ph-(v-min)/(max-min)*ph};
    ctx.strokeStyle="#1a2228";ctx.lineWidth=0.5;
    for(var i=0;i<=4;i++){var y=pad.top+ph*i/4;ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke()}
    ctx.strokeStyle="#3b82f6";ctx.lineWidth=2;ctx.beginPath();var first=true;
    candles.forEach(function(c,i){if(c.c==null)return;var x=pad.left+(i/(candles.length-1))*pw,ny=yScale(c.c);if(first){ctx.moveTo(x,ny);first=false}else ctx.lineTo(x,ny)});
    ctx.stroke();
    var grad=ctx.createLinearGradient(0,pad.top,0,H-pad.bottom);
    grad.addColorStop(0,"rgba(59,130,246,0.3)");grad.addColorStop(1,"rgba(59,130,246,0)");
    ctx.fillStyle=grad;ctx.lineTo(pad.left+pw,H-pad.bottom);ctx.lineTo(pad.left,H-pad.bottom);ctx.closePath();ctx.fill();
    ctx.fillStyle="#6b7280";ctx.font="10px monospace";ctx.textAlign="right";
    for(var i=0;i<=4;i++){var v=min+(max-min)*i/4;ctx.fillText(fmtPrice(v),pad.left-6,pad.top+ph-ph*i/4+3)}
    ctx.textAlign="center";
    [0,Math.floor(candles.length/2),candles.length-1].forEach(function(i){var d=new Date(candles[i].t*1000);ctx.fillText((d.getMonth()+1)+"/"+d.getDate(),pad.left+(i/(candles.length-1))*pw,H-8)});
  },[candles]);
  return e("canvas",{ref:canvasRef,style:{width:"100%",height:260,background:"#0B1113",borderRadius:12}});
}
function FinTable(p){var data=p.data;
  if(!data||!data.length)return e("p",{style:{padding:24,color:"#6b7280",fontSize:13}},"No data");
  var maxCols=Math.max.apply(null,data.map(function(r){return r.values.length}));
  return e("table",{style:{width:"100%",fontSize:12,borderCollapse:"collapse"}},
    e("thead",null,
      e("tr",{style:{borderBottom:"1px solid #1E2B31"}},
        e("th",{style:{textAlign:"left",padding:"10px 16px",color:"#6b7280",position:"sticky",left:0,background:"#111820",zIndex:1}},"Item"),
        Array.from({length:maxCols},function(_,i){return e("th",{key:i,style:{textAlign:"right",padding:"10px 12px",color:"#6b7280"}},"Q"+(i+1))})
      )
    ),
    e("tbody",null,
      data.map(function(row,i){return e("tr",{key:i,style:{borderBottom:"1px solid rgba(30,43,49,0.3)"}},
        e("td",{style:{padding:"8px 16px",color:"#9ca3af",position:"sticky",left:0,background:"#111820",whiteSpace:"nowrap"}},row.title),
        row.values.map(function(v,j){return e("td",{key:j,style:{textAlign:"right",padding:"8px 12px",color:"#e5e7eb",fontFamily:"monospace",whiteSpace:"nowrap"}},fmtFin(v))})
      )})
    )
  );
}
ReactDOM.render(e(App),document.getElementById("root"));
})();
